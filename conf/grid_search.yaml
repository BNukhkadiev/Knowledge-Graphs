# Grid / sweep config for RDF2Vec-style training (Gensim: src/train/train_word2vec.py).
#
# Structure:
#   1) training_mode — no_pretrain | P1 | P2
#   2) If P1 or P2: pretrain on protograph (walk params + pretrain Word2Vec epochs only)
#   3) Finetune: instance KG walks + Word2Vec parameters for the instance stage
#
# Sweep driver semantics:
#   - no_pretrain  → --mode none on instance walks; use finetune.* only (skip pretrain.*)
#   - P1           → --mode p1: pretrain.walks on P1 protograph .nt → walks_p1.txt, then finetune.*
#   - P2           → --mode p2: pretrain.walks on P2 protograph .nt → walks_p2.txt, then finetune.*
#
# For P1/P2, train_word2vec.py uses the same --dim, --window, --negative, … for both stages;
# stage-1 learning rate is --pretrain-lr / --pretrain-min-alpha (see pretrain.word2vec); stage 2
# uses --lr / --min-alpha from finetune.word2vec. Epochs: pretrain.word2vec vs finetune_epochs.
#
# Cartesian product of all lists can explode — fix training_mode to one value or trim lists.
# Random search: scripts/run_grid_search.py --random-search --limit N samples N configs
# (one uniform draw per list; training_mode is drawn each trial). Use --random-seed for reproducibility.

# ---------------------------------------------------------------------------
# 1) Mode (maps to --mode none | p1 | p2)
# ---------------------------------------------------------------------------
training_mode:
  # - no_pretrain
  # - P1
  - P2

# ---------------------------------------------------------------------------
# 2) Pretrain — only when training_mode is P1 or P2
#
# 2.1 Walks on the protograph for that variant (src/walk/random_walks.py):
#       P1: input = P1 protograph .nt  →  e.g. walks_p1.txt
#       P2: input = P2 protograph .nt  →  e.g. walks_p2.txt
# 2.2 Word2Vec: --pretrain-epochs, --pretrain-lr (optional: pretrain_min_alpha).
# ---------------------------------------------------------------------------
pretrain:
  walks:
    mode:
      - jrdf2vec-duplicate-free
    depth:
      - 4
      - 8
      - 16
    walks_per_entity:
      - 100
      # - 200
      # - 300
    token_format:
      - angled

  word2vec:
    pretrain_epochs:
      # - 5
      - 10
      # - 20
    pretrain_lr:
      - 0.01
      - 0.1
    # pretrain_min_alpha:
    #   - 0.0001

# ---------------------------------------------------------------------------
# 3) Finetune — instance knowledge graph
#
# 3.1 Instance graph walks (random_walks.py on instance .nt)
# 3.2 Word2Vec on instance corpus:
#       no_pretrain     → --epochs from epochs (ignore finetune_epochs)
#       P1 / P2         → --finetune-epochs from finetune_epochs
#     Shared knobs (architecture, dim, window, …) apply to the instance stage; for P1/P2 they
#     are also used for the pretrain stage with the same CLI.
# ---------------------------------------------------------------------------
finetune:
  walks:
    mode:
      - jrdf2vec-duplicate-free
    depth:
      - 4
      # - 8
      # - 16
    walks_per_entity:
      - 100
      - 200
      - 300
    token_format:
      - angled

  word2vec:
    # no_pretrain (--mode none): maps to --epochs
    epochs:
      - 5
      - 10

    # P1 / P2 (instance finetune): maps to --finetune-epochs
    finetune_epochs:
      - 5
      - 10

    architecture:
      - skipgram

    dim:
      - 128
      - 256
      - 512

    window:
      - 3
      - 5
      - 10

    negative:
      - 5
      # - 10

    lr:
      - 0.025
      - 0.01

    min_alpha:
      - 0.0001

    min_count:
      - 1

# workers: 0
# seed: 42
